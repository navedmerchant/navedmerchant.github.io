<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoo Code – Download Counter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --border: #1e1e2e;
            --accent: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.4);
            --fg: #e2e8f0;
            --muted: #64748b;
            --green: #22c55e;
            --blue: #3b82f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124, 58, 237, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 58, 237, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }

        .bg-glow-1 { background: var(--accent); top: -200px; left: -100px; }
        .bg-glow-2 { background: var(--blue); bottom: -200px; right: -100px; animation-delay: -4s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 20px); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .logo svg { width: 20px; height: 20px; }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--muted);
            font-size: 1.05rem;
            margin-bottom: 3rem;
        }

        /* Total counter */
        .total-counter {
            margin-bottom: 3rem;
        }

        .total-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 40px var(--accent-glow), 0 0 80px rgba(124, 58, 237, 0.2);
            line-height: 1;
            margin-bottom: 0.25rem;
            position: relative;
            display: inline-block;
        }

        .total-number .digit {
            display: inline-block;
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.5); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .total-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--muted);
        }

        /* Source cards */
        .sources {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-bottom: 2.5rem;
        }

        @media (max-width: 500px) {
            .sources { grid-template-columns: 1fr; }
        }

        .source-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, transform 0.3s;
        }

        .source-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .source-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .source-card:hover::before { opacity: 1; }

        .source-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .source-icon.vscode { background: rgba(0, 122, 204, 0.15); color: #0078d4; }
        .source-icon.openvsx { background: rgba(124, 58, 237, 0.15); color: #7c3aed; }

        .source-name {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--muted);
            margin-bottom: 0.35rem;
        }

        .source-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
        }

        .source-bar {
            margin-top: 1rem;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            overflow: hidden;
        }

        .source-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
            width: 0%;
        }

        .source-bar-fill.vscode { background: linear-gradient(90deg, #0078d4, #00bcf2); }
        .source-bar-fill.openvsx { background: linear-gradient(90deg, #7c3aed, #a78bfa); }

        /* Pulse dot */
        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            margin-right: 6px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        }

        .live-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 2rem;
            letter-spacing: 0.05em;
        }

        /* Links */
        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.25rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--fg);
        }

        .link-btn:hover {
            border-color: var(--accent);
            background: rgba(124, 58, 237, 0.1);
            transform: translateY(-1px);
        }

        .link-btn svg { width: 16px; height: 16px; }

        /* Loading state */
        .loading .source-count,
        .loading .total-number {
            opacity: 0.3;
        }

        .skeleton {
            display: inline-block;
            width: 80px;
            height: 1.75rem;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--border) 25%, rgba(30,30,46,0.5) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        .skeleton-lg {
            width: 200px;
            height: 4rem;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Error state */
        .error-msg {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        /* Refresh timer */
        .refresh-timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            Zoo Code
        </div>

        <h1>Download Counter</h1>
        <p class="subtitle">Real-time installs across all marketplaces</p>

        <div class="live-label">
            <span class="live-dot"></span>
            Live — updates every 60 seconds
        </div>

        <div class="total-counter">
            <div class="total-number" id="total-count">
                <span class="skeleton skeleton-lg"></span>
            </div>
            <div class="total-label">Total Downloads</div>
        </div>

        <div class="sources">
            <div class="source-card" id="vscode-card">
                <div class="source-icon vscode">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23.15 2.587L18.21.21a1.494 1.494 0 0 0-1.705.29l-9.29 8.47-4.12-3.13a1.003 1.003 0 0 0-1.276.057L.34 7.265a1.003 1.003 0 0 0 0 1.47L3.83 12 .34 15.265a1.003 1.003 0 0 0 0 1.47l1.478 1.348a1.003 1.003 0 0 0 1.276.057l4.12-3.13 9.29 8.47c.44.44 1.11.57 1.705.29l4.94-2.377a1.5 1.5 0 0 0 .85-1.35V3.937a1.5 1.5 0 0 0-.85-1.35zM17.25 17.25L9.28 12l7.97-5.25v10.5z"/></svg>
                </div>
                <div class="source-name">VS Code Marketplace</div>
                <div class="source-count" id="vscode-count"><span class="skeleton"></span></div>
                <div class="source-bar"><div class="source-bar-fill vscode" id="vscode-bar"></div></div>
            </div>

            <div class="source-card" id="openvsx-card">
                <div class="source-icon openvsx">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
                </div>
                <div class="source-name">Open VSX Registry</div>
                <div class="source-count" id="openvsx-count"><span class="skeleton"></span></div>
                <div class="source-bar"><div class="source-bar-fill openvsx" id="openvsx-bar"></div></div>
            </div>
        </div>

        <div class="links">
            <a href="https://marketplace.visualstudio.com/items?itemName=ZooCodeOrganization.zoo-code" target="_blank" rel="noopener" class="link-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                VS Code Marketplace
            </a>
            <a href="https://open-vsx.org/extension/ZooCodeOrganization/zoo-code" target="_blank" rel="noopener" class="link-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                Open VSX Registry
            </a>
            <a href="https://github.com/ZooCodeOrganization" target="_blank" rel="noopener" class="link-btn">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
                GitHub
            </a>
        </div>

        <div class="refresh-timer" id="refresh-timer">Next refresh in 60s</div>
    </div>

    <script>
        const REFRESH_INTERVAL = 60; // seconds
        let vscodeCount = 0;
        let openvsxCount = 0;
        let countdown = REFRESH_INTERVAL;

        function formatNumber(n) {
            return n.toLocaleString('en-US');
        }

        function animateCounter(el, target) {
            const formatted = formatNumber(target);
            const digits = formatted.split('');
            el.innerHTML = '';
            digits.forEach((char, i) => {
                if (char === ',') {
                    const span = document.createElement('span');
                    span.textContent = ',';
                    span.style.display = 'inline-block';
                    el.appendChild(span);
                } else {
                    const span = document.createElement('span');
                    span.className = 'digit';
                    span.textContent = char;
                    span.style.animationDelay = `${i * 0.04}s`;
                    el.appendChild(span);
                }
            });
        }

        function updateBars() {
            const total = vscodeCount + openvsxCount;
            if (total === 0) return;
            const vscodePct = (vscodeCount / total) * 100;
            const openvsxPct = (openvsxCount / total) * 100;
            document.getElementById('vscode-bar').style.width = vscodePct + '%';
            document.getElementById('openvsx-bar').style.width = openvsxPct + '%';
        }

        function updateTotal() {
            const total = vscodeCount + openvsxCount;
            animateCounter(document.getElementById('total-count'), total);
        }

        async function fetchVSCodeMarketplace() {
            try {
                const response = await fetch('https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json;api-version=7.1-preview.1'
                    },
                    body: JSON.stringify({
                        filters: [{
                            criteria: [
                                { filterType: 7, value: 'ZooCodeOrganization.zoo-code' }
                            ]
                        }],
                        flags: 914
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                const ext = data.results?.[0]?.extensions?.[0];
                const installCount = ext?.statistics?.find(s => s.statisticName === 'install')?.value;
                if (typeof installCount === 'number') {
                    vscodeCount = installCount;
                    animateCounter(document.getElementById('vscode-count'), vscodeCount);
                    updateTotal();
                    updateBars();
                    return;
                }
                throw new Error('install count not found in response');
            } catch (e) {
                console.warn('VS Code Marketplace API failed, trying shields.io fallback', e);
                await fetchVSCodeViaShields();
            }
        }

        async function fetchVSCodeViaShields() {
            try {
                const res = await fetch('https://img.shields.io/visual-studio-marketplace/d/ZooCodeOrganization.zoo-code.json');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const value = data.value;
                // shields.io returns formatted strings like "1.2M" or "123,456"
                const parsed = typeof value === 'string'
                    ? parseShieldsValue(value)
                    : parseInt(value, 10);
                if (!isNaN(parsed)) {
                    vscodeCount = parsed;
                    animateCounter(document.getElementById('vscode-count'), vscodeCount);
                    updateTotal();
                    updateBars();
                }
            } catch (e) {
                console.error('Shields.io fallback for VS Code also failed', e);
                document.getElementById('vscode-count').textContent = '—';
            }
        }

        function parseShieldsValue(val) {
            if (typeof val !== 'string') return parseInt(val, 10);
            val = val.trim();
            if (val.endsWith('k') || val.endsWith('K')) {
                return Math.round(parseFloat(val) * 1000);
            }
            if (val.endsWith('M') || val.endsWith('m')) {
                return Math.round(parseFloat(val) * 1000000);
            }
            return parseInt(val.replace(/,/g, ''), 10);
        }

        async function fetchOpenVSX() {
            try {
                const res = await fetch('https://open-vsx.org/api/ZooCodeOrganization/zoo-code');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const downloads = data.downloadCount;
                if (typeof downloads === 'number') {
                    openvsxCount = downloads;
                    animateCounter(document.getElementById('openvsx-count'), openvsxCount);
                    updateTotal();
                    updateBars();
                    return;
                }
                throw new Error('downloads not found in response');
            } catch (e) {
                console.warn('Open VSX API failed, trying shields.io fallback', e);
                await fetchOpenVSXViaShields();
            }
        }

        async function fetchOpenVSXViaShields() {
            try {
                const res = await fetch('https://img.shields.io/open-vsx/dt/ZooCodeOrganization/zoo-code.json');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const value = data.value;
                const parsed = typeof value === 'string'
                    ? parseShieldsValue(value)
                    : parseInt(value, 10);
                if (!isNaN(parsed)) {
                    openvsxCount = parsed;
                    animateCounter(document.getElementById('openvsx-count'), openvsxCount);
                    updateTotal();
                    updateBars();
                }
            } catch (e) {
                console.error('Shields.io fallback for Open VSX also failed', e);
                document.getElementById('openvsx-count').textContent = '—';
            }
        }

        async function fetchAll() {
            await Promise.allSettled([
                fetchVSCodeMarketplace(),
                fetchOpenVSX()
            ]);
        }

        // Countdown timer
        function startTimer() {
            countdown = REFRESH_INTERVAL;
            const timerEl = document.getElementById('refresh-timer');
            const tick = () => {
                countdown--;
                if (countdown <= 0) {
                    fetchAll().then(() => {
                        startTimer();
                    });
                    return;
                }
                timerEl.textContent = `Next refresh in ${countdown}s`;
                requestAnimationFrame(() => setTimeout(tick, 1000));
            };
            tick();
        }

        // Initial fetch
        fetchAll().then(() => {
            startTimer();
        });
    </script>
</body>
</html>
